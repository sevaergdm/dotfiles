general {
  lock_cmd = pidof hyprlock || hyprlock
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd = hyprctl dispatch 'hl.disp.dpms({ action = "enable" })'
}

listener {
  timeout = 300
  on-timeout = loginctl lock-session
}

listener {
    timeout = 330                                                     # 5.5min
    on-timeout = hyprctl 'hl.dsp.dpms({ action = "disable" })'                           # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && brightnessctl -r          # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 1800                                # 30min
    on-timeout = systemctl suspend                # suspend pc
}
